name: Build and release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create/update, e.g. latest or v0.1.0'
        required: false
        default: 'latest'
      prerelease:
        description: 'Mark the release as a prerelease'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  APP_NAME: cs2-server-chooser

jobs:
  build:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: cs2-server-chooser-linux-x86_64
            binary_name: cs2-server-chooser
            archive_name: cs2-server-chooser-linux-x86_64.tar.gz
          - label: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: cs2-server-chooser-windows-x86_64
            binary_name: cs2-server-chooser.exe
            archive_name: cs2-server-chooser-windows-x86_64.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcb-keysyms1-dev \
            libxcb-randr0-dev \
            libxcb-image0-dev \
            libxcb-icccm4-dev \
            libxcb-sync-dev \
            libxcb-xinerama0-dev \
            libxcb-cursor-dev \
            libgtk-3-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Check
        run: cargo check --locked --target ${{ matrix.target }}

      - name: Test
        run: cargo test --locked --target ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage Unix artifact
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p "dist/${{ matrix.artifact_name }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.artifact_name }}/"
          cp README* "dist/${{ matrix.artifact_name }}/" 2>/dev/null || true
          cp LICENSE* "dist/${{ matrix.artifact_name }}/" 2>/dev/null || true
          tar -C dist -czf "dist/${{ matrix.archive_name }}" "${{ matrix.artifact_name }}"

      - name: Stage Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist/${{ matrix.artifact_name }}" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.artifact_name }}/"
          Get-ChildItem -Path . -Filter "README*" -File | Copy-Item -Destination "dist/${{ matrix.artifact_name }}" -ErrorAction SilentlyContinue
          Get-ChildItem -Path . -Filter "LICENSE*" -File | Copy-Item -Destination "dist/${{ matrix.artifact_name }}" -ErrorAction SilentlyContinue
          Compress-Archive -Path "dist/${{ matrix.artifact_name }}" -DestinationPath "dist/${{ matrix.archive_name }}" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.archive_name }}
          path: dist/${{ matrix.archive_name }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Choose release tag
        id: release_tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: ${{ steps.release_tag.outputs.tag }}
          files: dist/*
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease == 'true' }}
          generate_release_notes: true
          make_latest: ${{ steps.release_tag.outputs.tag == 'latest' && 'true' || 'legacy' }}
